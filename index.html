<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dorama App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #181818);
            color: var(--tg-theme-text-color, #ffffff);
            margin: 0;
            padding: 15px 15px 80px 15px;
        }
        .header-monetization {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            padding: 10px 15px;
            border-radius: 10px;
            color: #000;
        }
        .header-monetization.is-vip {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
        }
        .header-monetization span {
            font-weight: bold;
            font-size: 14px;
        }
        .vip-btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .search-box {
            flex-grow: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--tg-theme-hint-color, #555);
            background: var(--tg-theme-secondary-bg-color, #242424);
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }
        .filter-btn {
            background: var(--tg-theme-secondary-bg-color, #242424);
            border: 1px solid var(--tg-theme-hint-color, #555);
            border-radius: 10px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            padding: 0;
        }
        .filter-btn svg {
            fill: var(--tg-theme-text-color, #ffffff);
            width: 20px;
            height: 20px;
        }
        .filter-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, padding 0.3s ease-out;
            background: var(--tg-theme-secondary-bg-color, #242424);
            border-radius: 10px;
            margin-bottom: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-sizing: border-box;
        }
        .filter-panel.open {
            max-height: 120px;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--tg-theme-hint-color, #555);
        }
        .filter-option {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .filter-option.active {
            background: var(--tg-theme-button-color, #248bcf);
            color: var(--tg-theme-button-text-color, #ffffff);
            font-weight: bold;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #242424);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .card-content {
            padding: 10px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .title {
            font-size: 14px;
            font-weight: bold;
            margin: 0 0 5px 0;
        }
        .tags {
            font-size: 10px;
            color: var(--tg-theme-link-color, #248bcf);
            margin-bottom: 10px;
        }
        .btn {
            background: var(--tg-theme-button-color, #248bcf);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            font-size: 12px;
            margin-top: auto;
        }
        .ads-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #242424;
            border-top: 1px solid var(--tg-theme-hint-color, #555);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .ads-content {
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="header-monetization" id="vip-header">
        <span id="vip-text">Смотри без рекламы! 🍿</span>
        <button class="vip-btn" id="vip-btn" onclick="buyVip()">🔥 VIP</button>
    </div>
    
    <div class="search-container">
        <input type="text" id="search" class="search-box" placeholder="Поиск по названию или коду...">
        <button id="filter-btn" class="filter-btn">
            <svg viewBox="0 0 24 24">
                <path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/>
            </svg>
        </button>
    </div>

    <div id="filter-panel" class="filter-panel">
        <div class="filter-option active" data-sort="new">По новизне</div>
        <div class="filter-option" data-sort="old">По добавлению</div>
    </div>
    
    <div class="grid" id="catalog"></div>

    <div class="ads-banner" id="bottom-ad-banner">
        <div class="ads-content">
            <span>Реклама поддерживает наш проект ❤️</span>
</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const AdController = window.Adsgram.init({ blockId: "33569" });

        const tsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTX5uaNZKtkHBG-syXyYCtsOgDSWIvSBXqmcePeizVPHs_wGj_BSsfEyXTbh6IaP3okacirVCyhDwfO/pub?gid=0&single=true&output=tsv"; 
        const vipTsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTX5uaNZKtkHBG-syXyYCtsOgDSWIvSBXqmcePeizVPHs_wGj_BSsfEyXTbh6IaP3okacirVCyhDwfO/pub?gid=888526673&single=true&output=tsv";

        let doramas = [];
        let currentSort = 'new'; 
        let searchQuery = '';
        let userIsVip = false;

        async function checkVipStatus() {
            try {
                const userId = tg.initDataUnsafe?.user?.id?.toString();
                if (!userId) return;

                const response = await fetch(vipTsvUrl);
                const data = await response.text();
                const lines = data.split("\n");

                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i].trim();
                    if (!row) continue;
                    const cols = row.split("\t");
                    if (cols[0]?.trim() === userId) {
                        userIsVip = true;
                        break;
                    }
                }

                if (userIsVip) {
                    document.getElementById("vip-header").classList.add("is-vip");
                    document.getElementById("vip-text").innerText = "👑 У вас активен VIP-доступ!";
                    document.getElementById("vip-btn").style.display = "none";
                    document.getElementById("bottom-ad-banner").style.display = "none";
                    document.body.style.paddingBottom = "15px";
                }
            } catch (e) {
                console.error("Ошибка проверки VIP:", e);
            }
        }

        function buyVip() {
            const userId = tg.initDataUnsafe?.user?.id;
            const username = tg.initDataUnsafe?.user?.username || "NoName";

            if (!userId) {
                tg.showAlert("Ошибка: не удалось определить ваш Telegram ID.");
                return;
            }

            tg.showConfirm("Хотите купить VIP за 150 ⭐️ Stars? Бот пришлет счет в чат.", (confirm) => {
                if (confirm) {
                    const makeWebhookUrl = "https://hook.us2.make.com/yinwegr6mbko0m0ly3vhxvjq7gxh7fn0";

                    fetch(`${makeWebhookUrl}?chat_id=${userId}&username=${username}`)
                        .then(() => {
                            tg.showAlert("Счет на оплату отправлен вам в чат с ботом! Закройте приложение и оплатите его.");
                            tg.close();
                        })
                        .catch(() => {
                            tg.showAlert("Произошла ошибка при создании счета. Попробуйте позже.");
                        });
                }
            });
        }

        async function loadDoramas() {
            await checkVipStatus();
            try {
                const response = await fetch(tsvUrl);
                const data = await response.text();
                const lines = data.split("\n");
                doramas = []; 

                for(let i = 1; i < lines.length; i++) {
                    const row = lines[i].trim();
                    if (!row) continue; 
                    const cols = row.split("\t");
                    if (cols.length < 2) continue; 
                    
                    doramas.push({
                        code: cols[0]?.trim(),
                        nameRu: cols[1]?.trim(),
                        nameOrig: cols[2]?.trim(),
                        tags: cols[3]?.trim(),
                        desc: cols[4]?.trim(),
                        poster: cols[5]?.trim(), 
                        link: cols[6]?.trim()
                    });
                }
                filterAndRender();
            } catch (error) {
                console.error("Ошибка загрузки:", error);
            }
        }

        function filterAndRender() {
            let filtered = doramas.filter(item => 
                item.nameRu.toLowerCase().includes(searchQuery) || 
                item.code.toLowerCase().includes(searchQuery) ||
                item.tags.toLowerCase().includes(searchQuery)
            );

            if (currentSort === 'new') {
                filtered.reverse();
            }
            renderCatalog(filtered);
        }

        function renderCatalog(list) {
            const container = document.getElementById("catalog");
            container.innerHTML = "";
            
            if (list.length === 0) {
                container.innerHTML = "<div style='grid-column: 1/-1; text-align: center;'>Ничего не найдено...</div>";
                return;
            }

            list.forEach(item => {
                let cleanLink = "#";
                if(item.link && item.link.includes("|")) {
                    cleanLink = item.link.split("|")[1].split("]")[0];
                } else if(item.link) {
                    cleanLink = item.link;
                }

                container.innerHTML += `
                    <div class="card">
                        <img src="${item.poster}" onerror="this.src='https://placehold.co/200x300?text=Обложка...'">
                        <div class="card-content">
                            <div class="title">${item.nameRu}</div>
                            <div class="tags">${item.tags}</div>
                            <button onclick="watchDorama('${cleanLink}')" class="btn">Смотреть</button>
                        </div>
                    </div>
                `;
            });
        }

        function watchDorama(link) {
            if (link === "#") {
                tg.showAlert("Ссылка недоступна!");
                return;
            }
            if (userIsVip) {
                tg.openLink(link);
                return;
            }
            AdController.show().then(() => {
                tg.openLink(link);
            }).catch(() => {
                tg.openLink(link);
            });
        }

        document.getElementById("search").addEventListener("input", (e) => {
            searchQuery = e.target.value.toLowerCase();
            filterAndRender();
        });

        const filterBtn = document.getElementById("filter-btn");
        const filterPanel = document.getElementById("filter-panel");

        filterBtn.addEventListener("click", () => {
            filterPanel.classList.toggle("open");
        });

        const options = document.querySelectorAll(".filter-option");
        options.forEach(option => {
            option.addEventListener("click", () => {
                options.forEach(opt => opt.classList.remove("active"));
                option.classList.add("active");
                currentSort = option.getAttribute("data-sort");
                filterAndRender();
                filterPanel.classList.remove("open");
            });
        });

        loadDoramas();
    </script>
</body>
</html>
